<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#b545ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagon border -->
  <polygon points="50,8 88,30 88,70 50,92 12,70 12,30" stroke="url(#logo-grad)" stroke-width="4" stroke-linejoin="round" fill="rgba(12, 13, 18, 0.6)" filter="url(#glow)"/>
  <!-- Abstract 'L' and 'F' combination in center representing LOEF -->
  <path d="M38,30 L38,70 L62,70" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M38,30 L58,30" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M38,48 L54,48" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round"/>
</svg>
